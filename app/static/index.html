<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyBooks</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="control-band">
        <div class="control-row">
          <label class="field">
            <span class="field-label">検索</span>
            <input id="search-input" type="search" placeholder="タイトル・著者・出版社・ISBN" />
          </label>
        </div>
        <div class="toolbar-row">
          <button id="favorite-toggle" type="button" class="toolbar-chip" aria-pressed="false">
            favorite のみ
          </button>
          <button id="register-toggle" type="button" class="toolbar-chip toolbar-chip-strong" aria-expanded="false">
            登録
          </button>
        </div>
        <section id="register-panel" class="register-panel" hidden>
          <form id="add-form" class="add-form">
            <label class="field isbn-field">
              <span class="field-label">ISBN 追加</span>
              <input
                id="isbn-input"
                type="text"
                inputmode="numeric"
                autocomplete="off"
                placeholder="978..."
              />
            </label>
            <div class="add-actions">
              <button id="add-button" type="submit">Google Books から追加</button>
              <button id="scan-button" type="button" class="button-secondary">スキャンで追加</button>
            </div>
          </form>
          <section id="scanner-panel" class="scanner-panel" hidden>
            <div class="scanner-header">
              <div>
                <p class="scanner-title">バーコード読み取り</p>
                <p class="scanner-caption">背面カメラで ISBN バーコードを写してください</p>
              </div>
              <button id="scanner-close-button" type="button" class="button-secondary">
                閉じる
              </button>
            </div>
            <div class="scanner-viewport">
              <video id="scanner-video" class="scanner-video" playsinline muted></video>
              <div class="scanner-guide" aria-hidden="true"></div>
            </div>
            <p id="scanner-status" class="scanner-status"></p>
          </section>
        </section>
        <div class="status-row">
          <p id="status-text" class="status-text"></p>
          <p id="count-text" class="count-text"></p>
        </div>
      </section>

      <section class="list-band">
        <ul id="book-list" class="book-list"></ul>
      </section>
    </main>

    <template id="book-item-template">
      <li class="book-item">
        <a class="book-link">
          <div class="thumb-wrap">
            <img class="thumb" alt="" loading="lazy" />
          </div>
          <div class="book-meta">
            <div class="title-row">
              <h2 class="book-title"></h2>
              <span class="favorite-chip" hidden>favorite</span>
            </div>
            <p class="book-authors"></p>
            <p class="book-publisher"></p>
            <div class="book-facts">
              <span class="book-isbn"></span>
              <span class="book-date"></span>
              <span class="book-registered"></span>
            </div>
            <div class="scrap-strip">
              <div class="scrap-strip-header">
                <span class="scrap-strip-label">scrap</span>
                <span class="scrap-strip-count"></span>
              </div>
              <div class="scrap-preview-list"></div>
            </div>
          </div>
        </a>
      </li>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
